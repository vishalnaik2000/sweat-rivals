<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta name="theme-color" content="#0f1220">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-180.png">
<title>Habits</title>
<style>
  :root{
    --bg:#0f1220; --bg2:#171b2e; --card:#1c2138; --card2:#232a47;
    --text:#eef1ff; --muted:#9aa3c7; --line:#2c3458;
    --good:#3ddc84; --bad:#ff6b6b; --accent:#6c8cff; --warn:#ffc857;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(84px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:18px 18px 6px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  header h1{font-size:22px; margin:0; letter-spacing:.3px;}
  header .sub{color:var(--muted); font-size:13px; margin-top:2px;}
  .datenav{display:flex; align-items:center; gap:6px;}
  .datenav button{
    background:var(--card); border:1px solid var(--line); color:var(--text);
    width:38px; height:38px; border-radius:12px; font-size:18px; cursor:pointer;
  }
  .datenav .today-label{font-size:13px; color:var(--muted); min-width:96px; text-align:center;}
  main{padding:8px 14px 20px; max-width:560px; margin:0 auto;}

  /* Habit cards (Today view) */
  .habit{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; margin:10px 0; display:flex; align-items:center; gap:14px;
  }
  .habit .emoji{font-size:24px; width:32px; text-align:center; flex:none;}
  .habit .label{flex:1; font-size:16px; font-weight:600;}
  .habit .label small{display:block; font-weight:400; color:var(--muted); font-size:12px; margin-top:2px;}

  /* bool toggle */
  .toggle{
    width:64px; height:36px; border-radius:20px; background:var(--card2); border:1px solid var(--line);
    position:relative; cursor:pointer; flex:none; transition:background .15s;
  }
  .toggle .knob{position:absolute; top:3px; left:3px; width:28px; height:28px; border-radius:50%;
    background:#cfd6ff; transition:transform .15s;}
  .toggle.on{background:var(--good);}
  .toggle.on.neg{background:var(--bad);}
  .toggle.on .knob{transform:translateX(28px); background:#fff;}

  /* counter */
  .counter{display:flex; align-items:center; gap:10px; flex:none;}
  .counter button{width:38px; height:38px; border-radius:12px; border:1px solid var(--line);
    background:var(--card2); color:var(--text); font-size:22px; cursor:pointer; line-height:1;}
  .counter .val{min-width:30px; text-align:center; font-size:20px; font-weight:700;}

  /* scale */
  .scale{display:flex; gap:6px; flex:none;}
  .scale button{width:34px; height:38px; border-radius:10px; border:1px solid var(--line);
    background:var(--card2); color:var(--muted); font-size:15px; font-weight:700; cursor:pointer;}
  .scale button.sel{background:var(--accent); color:#fff; border-color:var(--accent);}

  /* number */
  .numfield{display:flex; align-items:center; gap:8px; flex:none;}
  .numfield input{width:74px; height:40px; border-radius:12px; border:1px solid var(--line);
    background:var(--card2); color:var(--text); font-size:17px; text-align:center; font-weight:700;}

  /* note */
  .notewrap{display:block;}
  .notewrap textarea{width:100%; margin-top:10px; min-height:64px; resize:vertical;
    background:var(--card2); border:1px solid var(--line); border-radius:12px; color:var(--text);
    padding:10px 12px; font-size:15px; font-family:inherit;}

  .saved{ text-align:center; color:var(--muted); font-size:12px; height:16px; margin:4px 0 0;}

  /* Dashboard */
  .range{display:flex; gap:8px; justify-content:center; margin:6px 0 14px;}
  .range button{background:var(--card); border:1px solid var(--line); color:var(--muted);
    padding:7px 14px; border-radius:999px; font-size:13px; cursor:pointer;}
  .range button.sel{background:var(--accent); color:#fff; border-color:var(--accent);}
  .statcard{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; margin:10px 0;}
  .statcard .head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .statcard .head .emoji{font-size:20px;}
  .statcard .head .name{font-weight:600; flex:1;}
  .statcard .head .big{font-size:20px; font-weight:800;}
  .statcard .sub{color:var(--muted); font-size:12px; margin-bottom:10px;}
  .bars{display:flex; align-items:flex-end; gap:3px; height:46px;}
  .bars .bar{flex:1; background:var(--accent); border-radius:3px 3px 0 0; min-height:2px; opacity:.85;}
  .bars .bar.good{background:var(--good);} .bars .bar.bad{background:var(--bad);}
  .bars .bar.empty{background:var(--card2);}
  .bars .bar.warn{background:var(--warn);}
  .barlabels{display:flex; justify-content:space-between; color:var(--muted); font-size:10px; margin-top:4px;}
  .pill{display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px; font-weight:700;}
  .pill.good{background:rgba(61,220,132,.16); color:var(--good);}
  .pill.bad{background:rgba(255,107,107,.16); color:var(--bad);}
  .empty-note{color:var(--muted); text-align:center; padding:40px 20px; line-height:1.5;}

  /* tabbar */
  .tabbar{position:fixed; bottom:0; left:0; right:0; display:flex;
    background:rgba(18,22,40,.92); backdrop-filter:blur(14px); border-top:1px solid var(--line);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));}
  .tabbar button{flex:1; background:none; border:none; color:var(--muted); font-size:11px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;}
  .tabbar button .ico{font-size:21px;}
  .tabbar button.sel{color:var(--accent);}

  .view{display:none;} .view.active{display:block;}

  /* settings */
  .row{display:flex; gap:10px; flex-wrap:wrap;}
  .btn{background:var(--card); border:1px solid var(--line); color:var(--text);
    padding:11px 16px; border-radius:12px; font-size:14px; cursor:pointer; flex:1; text-align:center;}
  .btn.danger{color:var(--bad); border-color:rgba(255,107,107,.4);}
  .section-title{color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:1px;
    margin:22px 4px 8px;}
</style>
</head>
<body>
<header>
  <div>
    <h1 id="title">Today</h1>
    <div class="sub" id="subtitle"></div>
  </div>
  <div class="datenav" id="datenav">
    <button id="prevDay" aria-label="Previous day">‹</button>
    <div class="today-label" id="dayLabel"></div>
    <button id="nextDay" aria-label="Next day">›</button>
  </div>
</header>

<main>
  <section id="todayView" class="view active"></section>
  <section id="dashView" class="view"></section>
  <section id="moreView" class="view"></section>
</main>

<nav class="tabbar">
  <button data-tab="today" class="sel"><span class="ico">✅</span>Today</button>
  <button data-tab="dash"><span class="ico">📊</span>Dashboard</button>
  <button data-tab="more"><span class="ico">⚙️</span>Data</button>
</nav>

<script>
/* ============ CONFIG: edit this list to add/remove habits ============ */
const HABITS = [
  {key:'gym',      label:'Went to the gym',        type:'bool',    emoji:'🏋️', good:true},
  {key:'read',     label:'Read 10+ pages',         type:'bool',    emoji:'📖', good:true},
  {key:'meditate', label:'Meditated',              type:'bool',    emoji:'🧘', good:true},
  {key:'steps',    label:'Hit my step goal',       type:'bool',    emoji:'👟', good:true},
  {key:'sleep',    label:'Sleep',                  type:'number',  emoji:'😴', good:'high', unit:'hrs', step:0.5, max:14},
  {key:'water',    label:'Water',                  type:'number',  emoji:'💧', good:'high', unit:'ltrs', step:0.5, max:5},
  {key:'mood',     label:'Overall mood',           type:'scale',   emoji:'🙂', max:5, hint:'1 = awful · 5 = great'},
  {key:'lonely',   label:'Felt lonely / desperate',type:'scale',   emoji:'🌧️', max:5, good:'low', hint:'1 = not at all · 5 = a lot'},
  {key:'cigs',     label:'Cigarettes',             type:'counter', emoji:'🚬', good:'low', unit:'smoked'},
  {key:'alcohol',  label:'Alcohol',                type:'counter', emoji:'🍺', good:'low', unit:'drinks'},
  {key:'porn',     label:'Watched porn',           type:'bool',    emoji:'📵', good:false},
  {key:'fap',      label:'Masturbated',            type:'bool',    emoji:'✋', good:false},
  {key:'note',     label:'Note',                   type:'text',    emoji:'📝', hint:'Anything notable about today'},
];
const STORE_KEY = 'habit-data-v1';

/* ============ STATE ============ */
let data = load();
let curDate = todayStr();
let range = 14;

function load(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {entries:{}}; }
  catch(e){ return {entries:{}}; }
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
function entry(d){ return data.entries[d] || {}; }
function setVal(d,key,val){
  if(!data.entries[d]) data.entries[d] = {};
  if(val===null || val==='' || val===undefined) delete data.entries[d][key];
  else data.entries[d][key]=val;
  if(Object.keys(data.entries[d]).length===0) delete data.entries[d];
  save();
  flashSaved();
}

/* ============ DATE HELPERS (local time) ============ */
function todayStr(){ return toStr(new Date()); }
function toStr(dt){
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function parse(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(s,n){ const dt=parse(s); dt.setDate(dt.getDate()+n); return toStr(dt); }
function prettyDate(s){
  const dt=parse(s), t=todayStr();
  if(s===t) return 'Today';
  if(s===addDays(t,-1)) return 'Yesterday';
  return dt.toLocaleDateString(undefined,{weekday:'short', month:'short', day:'numeric'});
}

/* ============ RENDER: TODAY ============ */
function renderToday(){
  const e = entry(curDate);
  const root = document.getElementById('todayView');
  root.innerHTML='';
  HABITS.forEach(h=>{
    if(h.type==='text'){
      const wrap=el(`<div class="habit notewrap"><div style="display:flex;align-items:center;gap:14px;width:100%">
        <div class="emoji">${h.emoji}</div><div class="label">${h.label}<small>${h.hint||''}</small></div></div></div>`);
      const ta=document.createElement('textarea');
      ta.placeholder='Write something…'; ta.value=e[h.key]||'';
      ta.addEventListener('input',()=>setVal(curDate,h.key,ta.value.trim()));
      wrap.appendChild(ta); root.appendChild(wrap); return;
    }
    const card=el(`<div class="habit"><div class="emoji">${h.emoji}</div>
      <div class="label">${h.label}${h.hint?`<small>${h.hint}</small>`:(h.unit?`<small>${h.unit}</small>`:'')}</div></div>`);
    card.appendChild(control(h,e));
    root.appendChild(card);
  });
  const s=document.createElement('p'); s.className='saved'; s.id='savedMsg'; root.appendChild(s);
}

function control(h,e){
  const v=e[h.key];
  if(h.type==='bool'){
    const t=el(`<div class="toggle ${v?'on':''} ${h.good===false?'neg':''}"><div class="knob"></div></div>`);
    t.onclick=()=>{ const nv=!v; setVal(curDate,h.key,nv?true:null); renderToday(); };
    return t;
  }
  if(h.type==='counter'){
    const wrap=el(`<div class="counter"><button>−</button><div class="val">${v||0}</div><button>+</button></div>`);
    const val=wrap.querySelector('.val'); const [minus,plus]=wrap.querySelectorAll('button');
    minus.onclick=()=>{ let n=Math.max(0,(v||0)-1); setCounter(h,val,n); };
    plus.onclick =()=>{ let n=(Number(val.textContent)||0)+1; setCounter(h,val,n); };
    return wrap;
  }
  if(h.type==='scale'){
    const wrap=el(`<div class="scale"></div>`);
    for(let i=1;i<=h.max;i++){
      const b=el(`<button class="${v===i?'sel':''}">${i}</button>`);
      b.onclick=()=>{ const nv = v===i ? null : i; setVal(curDate,h.key,nv); renderToday(); };
      wrap.appendChild(b);
    }
    return wrap;
  }
  if(h.type==='number'){
    const wrap=el(`<div class="numfield"></div>`);
    const inp=document.createElement('input');
    inp.type='number'; inp.inputMode='decimal'; inp.step=h.step||1; inp.min=0; if(h.max)inp.max=h.max;
    inp.value = (v===undefined?'':v);
    inp.addEventListener('change',()=>{
      const n=parseFloat(inp.value);
      setVal(curDate,h.key, isNaN(n)?null:n);
    });
    wrap.appendChild(inp); return wrap;
  }
}
function setCounter(h,valEl,n){ valEl.textContent=n; setVal(curDate,h.key, n>0?n:null); }

let savedTimer;
function flashSaved(){
  const m=document.getElementById('savedMsg'); if(!m) return;
  m.textContent='Saved ✓'; clearTimeout(savedTimer);
  savedTimer=setTimeout(()=>{ if(m)m.textContent=''; },1200);
}

/* ============ RENDER: DASHBOARD ============ */
function lastDates(n){
  const arr=[]; for(let i=n-1;i>=0;i--) arr.push(addDays(todayStr(),-i)); return arr;
}
function renderDash(){
  const root=document.getElementById('dashView');
  const dates=lastDates(range);
  const hasAny=Object.keys(data.entries).length>0;
  let html=`<div class="range">
    <button data-r="7"  class="${range===7?'sel':''}">7 days</button>
    <button data-r="14" class="${range===14?'sel':''}">14 days</button>
    <button data-r="30" class="${range===30?'sel':''}">30 days</button>
    <button data-r="90" class="${range===90?'sel':''}">90 days</button></div>`;
  if(!hasAny){
    root.innerHTML = html + `<div class="empty-note">No data yet 🌱<br>Fill in <b>Today</b> and your trends will show up here.</div>`;
    bindRange(); return;
  }
  HABITS.forEach(h=>{ html += statCard(h,dates); });
  root.innerHTML=html;
  bindRange();
}
function bindRange(){
  document.querySelectorAll('.range button').forEach(b=>{
    b.onclick=()=>{ range=Number(b.dataset.r); renderDash(); };
  });
}
function statCard(h,dates){
  const vals = dates.map(d=> entry(d)[h.key]);
  if(h.type==='text'){
    const filled = vals.filter(v=>v).length;
    return card(h, `${filled}`, `notes written in ${dates.length} days`, '');
  }
  if(h.type==='bool'){
    const done = vals.filter(v=>v===true).length;
    const goodBool = h.good!==false;
    const streak = computeStreak(h, goodBool);
    const bars = vals.map(v=>{
      if(v===true) return {h:1, cls: goodBool?'good':'bad'};
      return {h:0.18, cls:'empty'};
    });
    const headBig = `<span class="pill ${goodBool?'good':'bad'}">${done}/${dates.length}</span>`;
    const sub = goodBool
      ? `🔥 ${streak}-day streak · done ${done} of last ${dates.length}`
      : `🧼 ${streak} clean day${streak===1?'':'s'} · happened ${done} time${done===1?'':'s'}`;
    return card(h, headBig, sub, barsHtml(bars,dates));
  }
  if(h.type==='counter' || h.type==='number'){
    const nums = vals.map(v=> typeof v==='number'? v : (v?Number(v):0));
    const present = vals.map((v,i)=> v!==undefined && v!==null);
    const tracked = present.filter(Boolean).length;
    const total = nums.reduce((a,b)=>a+b,0);
    const avgAll = (total/dates.length);
    const goodLow = h.good==='low';
    const maxV = Math.max(1, ...nums);
    const bars = nums.map((n,i)=>({
      h: present[i]? n/maxV : 0,
      cls: present[i] ? (goodLow ? (n===0?'good':'bad') : 'good') : 'empty'
    }));
    let headBig, sub;
    if(h.type==='counter' && goodLow){
      const cleanDays = present.filter((p,i)=>p && nums[i]===0).length; // explicit zero days
      headBig = `<span class="pill bad">${total}</span>`;
      sub = `${total} total · ~${avgAll.toFixed(1)}/day · ${h.unit||''}`;
    } else if(h.type==='counter'){
      headBig = `<span class="pill good">${total}</span>`;
      sub = `${total} total · ~${avgAll.toFixed(1)}/day · ${h.unit||''}`;
    } else { // number e.g. sleep
      const avgTracked = tracked? (total/tracked):0;
      headBig = `<span class="pill good">${avgTracked.toFixed(1)}</span>`;
      sub = `avg ${avgTracked.toFixed(1)} ${h.unit||''} · logged ${tracked} day${tracked===1?'':'s'}`;
    }
    return card(h, headBig, sub, barsHtml(bars,dates));
  }
  if(h.type==='scale'){
    const present = vals.map(v=> typeof v==='number');
    const tracked = present.filter(Boolean).length;
    const sum = vals.reduce((a,v)=> a + (typeof v==='number'?v:0),0);
    const avg = tracked? sum/tracked : 0;
    const goodLow = h.good==='low';
    const bars = vals.map(v=>{
      if(typeof v!=='number') return {h:0.12, cls:'empty'};
      const ratio=v/h.max;
      const cls = goodLow ? (ratio>=0.6?'bad':ratio>=0.4?'warn':'good')
                          : (ratio>=0.6?'good':ratio>=0.4?'warn':'bad');
      return {h:ratio, cls};
    });
    const headBig=`<span class="pill ${ (goodLow? avg<=2.5 : avg>=3) ?'good':'bad'}">${avg?avg.toFixed(1):'–'}</span>`;
    return card(h, headBig, `avg ${avg?avg.toFixed(1):'–'} / ${h.max} · logged ${tracked} day${tracked===1?'':'s'}`, barsHtml(bars,dates));
  }
}
function hasEntry(d,key){ return entry(d)[key]!==undefined; }
function computeStreak(h, goodBool){
  // count consecutive days ending today.
  let s=0; let d=todayStr();
  for(let i=0;i<400;i++){
    const did = entry(d)[h.key]===true;
    const ok = goodBool ? did : !did;
    // For "clean" (good=false) streak, today not-doing-it counts.
    if(ok) s++; else break;
    d=addDays(d,-1);
  }
  return s;
}
function barsHtml(bars,dates){
  const inner = bars.map(b=>`<div class="bar ${b.cls}" style="height:${Math.max(2,Math.round(b.h*46))}px"></div>`).join('');
  const first=prettyShort(dates[0]), last=prettyShort(dates[dates.length-1]);
  return `<div class="bars">${inner}</div><div class="barlabels"><span>${first}</span><span>${last}</span></div>`;
}
function prettyShort(s){ const dt=parse(s); return dt.toLocaleDateString(undefined,{month:'numeric',day:'numeric'}); }
function card(h, big, sub, body){
  return `<div class="statcard">
    <div class="head"><span class="emoji">${h.emoji}</span><span class="name">${h.label}</span><span class="big">${big}</span></div>
    <div class="sub">${sub}</div>${body}</div>`;
}

/* ============ RENDER: DATA / MORE ============ */
function renderMore(){
  const days=Object.keys(data.entries).length;
  document.getElementById('moreView').innerHTML = `
    <div class="statcard">
      <div class="head"><span class="emoji">💾</span><span class="name">Your data</span></div>
      <div class="sub">${days} day${days===1?'':'s'} logged · stored only on this device.</div>
      <div class="row" style="margin-top:6px">
        <button class="btn" id="expJson">Export JSON</button>
        <button class="btn" id="expCsv">Export CSV</button>
      </div>
      <div class="row" style="margin-top:10px">
        <button class="btn" id="impBtn">Import JSON</button>
        <input type="file" id="impFile" accept="application/json,.json" style="display:none">
      </div>
    </div>
    <div class="section-title">Danger zone</div>
    <div class="statcard">
      <div class="sub">Permanently delete every entry from this device.</div>
      <div class="row"><button class="btn danger" id="wipe">Erase all data</button></div>
    </div>
    <div class="empty-note" style="padding:20px 8px;font-size:12px">
      Tip: back up with <b>Export JSON</b> now and then.<br>Your habits are private — nothing leaves your phone.
    </div>`;
  document.getElementById('expJson').onclick=exportJson;
  document.getElementById('expCsv').onclick=exportCsv;
  document.getElementById('impBtn').onclick=()=>document.getElementById('impFile').click();
  document.getElementById('impFile').onchange=importJson;
  document.getElementById('wipe').onclick=()=>{
    if(confirm('Erase ALL habit data? This cannot be undone.')){ data={entries:{}}; save(); renderAll(); }
  };
}
function download(name, text, type){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportJson(){ download(`habits-${todayStr()}.json`, JSON.stringify(data,null,2),'application/json'); }
function exportCsv(){
  const cols=['date',...HABITS.map(h=>h.key)];
  const rows=[cols.join(',')];
  Object.keys(data.entries).sort().forEach(d=>{
    const e=data.entries[d];
    const r=[d,...HABITS.map(h=>{ let v=e[h.key]; if(v===undefined)return'';
      if(typeof v==='boolean')return v?'1':'0';
      if(typeof v==='string')return '"'+v.replace(/"/g,'""')+'"'; return v; })];
    rows.push(r.join(','));
  });
  download(`habits-${todayStr()}.csv`, rows.join('\n'),'text/csv');
}
function importJson(ev){
  const f=ev.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const obj=JSON.parse(r.result);
    if(!obj.entries) throw 0;
    if(confirm('Import will merge with existing data. Continue?')){
      data.entries={...data.entries,...obj.entries}; save(); renderAll(); alert('Imported ✓');
    }
  }catch(e){ alert('That file does not look like a habits backup.'); } };
  r.readAsText(f);
}

/* ============ NAV / TABS ============ */
function setTab(tab){
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('sel',b.dataset.tab===tab));
  ['today','dash','more'].forEach(t=>document.getElementById(t+'View').classList.toggle('active',t===tab));
  const dn=document.getElementById('datenav');
  if(tab==='today'){ document.getElementById('title').textContent='Today'; dn.style.display='flex'; renderToday(); updateDateUI(); }
  if(tab==='dash'){ document.getElementById('title').textContent='Dashboard'; dn.style.display='none';
    document.getElementById('subtitle').textContent='Your trends over time'; renderDash(); }
  if(tab==='more'){ document.getElementById('title').textContent='Data'; dn.style.display='none';
    document.getElementById('subtitle').textContent='Backup & manage'; renderMore(); }
}
function updateDateUI(){
  document.getElementById('dayLabel').textContent=prettyDate(curDate);
  document.getElementById('subtitle').textContent=parse(curDate).toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('nextDay').style.visibility = (curDate>=todayStr())?'hidden':'visible';
}
function renderAll(){ renderToday(); }

document.querySelectorAll('.tabbar button').forEach(b=> b.onclick=()=>setTab(b.dataset.tab));
document.getElementById('prevDay').onclick=()=>{ curDate=addDays(curDate,-1); renderToday(); updateDateUI(); };
document.getElementById('nextDay').onclick=()=>{ if(curDate<todayStr()){ curDate=addDays(curDate,1); renderToday(); updateDateUI(); } };

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }

/* init */
setTab('today');

/* service worker for offline */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
